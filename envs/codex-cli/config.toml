# Codex CLI config — routes through the OSU LiteLLM proxy.
# Seeded into $CODEX_HOME by the flake's shellHook. The API key is NOT stored
# here; `env_key` tells Codex to read it from the LITELLM_KEY environment variable.

model = "gpt-5.5-2026-04-24"
model_provider = "litellm"

# DEFAULT: OSU's LiteLLM proxy. To use a different OpenAI-compatible proxy, change
# base_url below (and, if needed, env_key to whatever var holds that proxy's key).
# To go DIRECT to OpenAI instead, set base_url = "https://api.openai.com/v1",
# env_key = "OPENAI_API_KEY", and a real OpenAI model id (e.g. model = "gpt-5.5").
[model_providers.litellm]
name = "OSU LiteLLM Proxy"
base_url = "https://litellm.cloud.osu.edu/v1"
env_key = "LITELLM_KEY"
# Codex only supports the Responses API (`wire_api = "chat"` was removed). The OSU
# LiteLLM proxy exposes POST /v1/responses, so this works. It is also the default.
wire_api = "responses"
